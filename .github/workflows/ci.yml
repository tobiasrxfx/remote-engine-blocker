name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -S . -B build -G Ninja -DCMAKE_C_COMPILER=gcc

      - name: Build
        run: cmake --build build

      #- name: Run tests
        # run: ctest --test-dir build --output-on-failure